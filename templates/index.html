<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Cake Store - จัดการร้านเค้ก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-rose-50/30 min-h-screen">
    <nav class="bg-rose-300 text-white p-4 shadow-sm sticky top-0 z-10">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold">🍰 Cake Store</a>
            <a href="/" class="bg-white text-rose-400 px-5 py-2 rounded-full font-bold hover:bg-rose-50 transition">Back to Home</a>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="bg-white p-8 rounded-[2rem] shadow-sm mb-10 border border-rose-100">
            <h2 class="text-xl font-bold text-rose-400 mb-6 flex items-center gap-2">✨ เพิ่มเค้กใหม่</h2>
            <form action="/add_cake" method="POST" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" name="name" placeholder="ชื่อเค้ก" class="border-rose-100 border-2 p-3 rounded-2xl outline-rose-300 bg-rose-50/20" required>
                <input type="number" name="price" placeholder="ราคา" class="border-rose-100 border-2 p-3 rounded-2xl outline-rose-300 bg-rose-50/20" required>
                <input type="number" name="stock" placeholder="สต็อก" class="border-rose-100 border-2 p-3 rounded-2xl outline-rose-300 bg-rose-50/20" required>
                <select name="category_id" class="border-rose-100 border-2 p-3 rounded-2xl outline-rose-300 bg-rose-50/20">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="bg-rose-400 text-white font-bold py-3 rounded-2xl hover:bg-rose-500 transition">บันทึก</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            {% for cake in cakes %}
            <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-rose-50 hover:shadow-md transition">
                <div class="text-3xl mb-3">🧁</div>
                <span class="text-[10px] bg-rose-100 text-rose-500 px-2 py-1 rounded-full font-bold uppercase tracking-widest">{{ cake.category_name }}</span>
                <h3 class="text-lg font-bold text-gray-700 mt-2">{{ cake.name }}</h3>
                <p class="text-xl font-bold text-rose-400 mt-1">{{ "{:,.0f}".format(cake.price) }} ฿</p>
                <p class="text-gray-400 text-xs">สต็อก: {{ cake.stock }}</p>
                
                <div class="flex gap-2 mt-5">
                    <button onclick="openEdit('{{ cake.id }}')" 
                            class="flex-1 bg-rose-50 text-rose-500 py-3 rounded-2xl font-bold hover:bg-rose-100 transition">แก้ไข</button>
                    <a href="/delete_cake/{{ cake.id }}" 
                       class="flex-1 bg-gray-50 text-gray-400 py-3 rounded-2xl font-bold text-center hover:bg-red-50 hover:text-red-500 transition" 
                       onclick="return confirm('ยืนยันการลบ?')">ลบ</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-rose-900/10 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-md shadow-2xl border border-rose-50">
            <h2 class="text-2xl font-bold text-rose-500 mb-6">📝 แก้ไขข้อมูล</h2>
            <form id="editForm" method="POST" class="space-y-4">
                <input type="text" name="name" id="e_name" class="w-full border-rose-100 border-2 p-4 rounded-2xl outline-rose-300 bg-rose-50/20" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" name="price" id="e_price" class="w-full border-rose-100 border-2 p-4 rounded-2xl outline-rose-300 bg-rose-50/20" required>
                    <input type="number" name="stock" id="e_stock" class="w-full border-rose-100 border-2 p-4 rounded-2xl outline-rose-300 bg-rose-50/20" required>
                </div>
                <select name="category_id" id="e_cat" class="w-full border-rose-100 border-2 p-4 rounded-2xl outline-rose-300 bg-rose-50/20">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeEdit()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold text-gray-500 hover:bg-gray-200 transition">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-rose-400 text-white py-4 rounded-2xl font-bold hover:bg-rose-500 transition shadow-lg">บันทึกใหม่</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function openEdit(id) {
            // ดึงข้อมูลจาก API /get_cake/id
            const response = await fetch('/get_cake/' + id);
            const data = await response.json();

            if (data.id) {
                // ใส่ข้อมูลลงในฟอร์ม Modal
                document.getElementById('editForm').action = '/edit_cake/' + id;
                document.getElementById('e_name').value = data.name;
                document.getElementById('e_price').value = data.price;
                document.getElementById('e_stock').value = data.stock;
                document.getElementById('e_cat').value = data.category_id;

                // แสดง Modal
                document.getElementById('editModal').classList.remove('hidden');
            }
        }

        function closeEdit() {
            document.getElementById('editModal').classList.add('hidden');
        }
    </script>
</body>
</html>
