<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Cake Station - ร้านเค้กพาสเทล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-pink-50 min-h-screen">
    <nav class="bg-rose-400 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold">🍰 Cake Station</a>
            <a href="/" class="bg-white text-rose-500 px-4 py-2 rounded-full font-bold hover:bg-rose-50 transition">Back to Home</a>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-pink-100 mb-10">
            <h2 class="text-xl font-bold text-rose-600 mb-4">เพิ่มเค้กใหม่</h2>
            <form action="/add_cake" method="POST" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" name="name" placeholder="ชื่อเค้ก" class="border p-2 rounded-lg outline-rose-300" required>
                <input type="number" name="price" placeholder="ราคา" class="border p-2 rounded-lg outline-rose-300" required>
                <input type="number" name="stock" placeholder="สต็อก" class="border p-2 rounded-lg outline-rose-300" required>
                <select name="category_id" class="border p-2 rounded-lg outline-rose-300">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="bg-rose-500 text-white font-bold py-2 rounded-lg hover:bg-rose-600">บันทึก</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for cake in cakes %}
            <div class="bg-white rounded-2xl p-5 shadow-sm border-b-4 border-rose-300 hover:shadow-md transition">
                <div class="text-4xl mb-2">🧁</div>
                <span class="text-xs bg-pink-100 text-rose-600 px-2 py-1 rounded-md font-bold">{{ cake.category_name }}</span>
                <h3 class="text-xl font-bold text-gray-800 mt-2">{{ cake.name }}</h3>
                <p class="text-2xl font-bold text-rose-500 mt-2">{{ "{:,.0f}".format(cake.price) }} ฿</p>
                <p class="text-gray-400 text-sm">คงเหลือ: {{ cake.stock }} ชิ้น</p>
                
                <div class="flex gap-2 mt-4">
                    <button onclick="openEdit('{{ cake.id }}', '{{ cake.name }}', '{{ cake.price }}', '{{ cake.stock }}', '{{ cake.category_id }}')" 
                            class="flex-1 bg-amber-100 text-amber-700 py-2 rounded-lg font-bold hover:bg-amber-200">แก้ไข</button>
                    <a href="/delete_cake/{{ cake.id }}" class="flex-1 bg-red-50 text-red-500 py-2 rounded-lg font-bold text-center hover:bg-red-100" onclick="return confirm('ลบหรือไม่?')">ลบ</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-xl">
            <h2 class="text-2xl font-bold text-rose-600 mb-4">แก้ไขเมนูเค้ก</h2>
            <form id="editForm" method="POST" class="space-y-4">
                <input type="text" name="name" id="e_name" class="w-full border p-3 rounded-xl outline-rose-300" required>
                <input type="number" name="price" id="e_price" class="w-full border p-3 rounded-xl outline-rose-300" required>
                <input type="number" name="stock" id="e_stock" class="w-full border p-3 rounded-xl outline-rose-300" required>
                <select name="category_id" id="e_cat" class="w-full border p-3 rounded-xl outline-rose-300">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
                <div class="flex gap-2">
                    <button type="button" onclick="closeEdit()" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold">บันทึกใหม่</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openEdit(id, name, price, stock, catId) {
            document.getElementById('editForm').action = '/edit_cake/' + id;
            document.getElementById('e_name').value = name;
            document.getElementById('e_price').value = price;
            document.getElementById('e_stock').value = stock;
            document.getElementById('e_cat').value = catId;
            document.getElementById('editModal').classList.remove('hidden');
        }
        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }
    </script>
</body>
</html>
